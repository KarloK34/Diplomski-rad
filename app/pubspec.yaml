name: gait_sense
description: "On-device gait analysis and classification app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cloud_firestore: ^6.6.0
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  file_selector: ^1.1.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  fl_chart: ^1.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_foreground_task: ^9.2.2
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  google_sign_in: ^7.2.0
  path_provider: ^2.1.5
  sensors_plus: ^7.0.0
  share_plus: ^13.1.0
  tflite_flutter: ^0.12.1
  vibration: ^3.2.0

# Dependency notes:
#  - sensors_plus 7.x exposes GravitySensorEvent, UserAccelerometerEvent and
#    GyroscopeEvent — sufficient for the v2 feature pipeline (attitude unused).
#  - tflite_flutter loads cnn_final.tflite ([1,128,8] -> [1,6]) on-device.
#  - flutter_bloc + equatable: project default for state management.
#  - flutter_foreground_task keeps the 50 Hz sampler alive with the screen off.
#  - path_provider resolves the documents directory for session-log JSON export.
#  - share_plus invokes the OS share sheet to export a session JSON.
#  - fl_chart draws the session distribution/timeline and cross-session trend
#    charts on the Home and Sessions tabs.
#  - firebase_core/firebase_auth/cloud_firestore: account auth, cloud sync of
#    session summaries (raw IMU samples stay local-only, see
#    SessionRepository), and per-account profile fields like height
#    (see UserProfileRepository).
#  - google_sign_in 7.x: Google sign-in option on the login/signup screens;
#    requires google_sign_in_android >=7.2.12 for AGP 9 support.
#  - flutter_svg renders the Google "G" logo asset on GoogleSignInButton.
#  - vibration drives the device motor to confirm a session actually started
#    while the phone is pocketed — HapticFeedback's impact ticks are too subtle
#    to feel through fabric. Requires android.permission.VIBRATE.
#  - file_selector backs the debug "import session" action (SessionImportAction)
#    that loads an exported session JSON from disk. Picked over file_picker,
#    which pins win32 versions incompatible with share_plus on this project.

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/cnn_final.tflite
    - assets/cnn_final.preproc.json
    - assets/icons/google_logo.svg
    - assets/illustrations/phone_pocket_placement.png
    # Test-only: small (~310 KB) truncated parity fixtures, bundled so the
    # on-device inference parity test (integration_test/) can read the expected
    # Python TFLite outputs via rootBundle. 
    # TODO: Strip these before any release build.
    - test/fixtures/parity/wlk_7_sub_5.infer.json
    - test/fixtures/parity/sit_5_sub_5.infer.json
